		<main class="homepage-main">
			<section class="contact-hero">
				<a class="contact-top-button" href="#contact-form">Send a Message</a>
				<h2>Contact Me</h2>
				<p>
					If you want to collaborate, discuss an iOS role, or review my case studies,
					send me a message and I will respond as soon as I can.
				</p>
			</section>

			<section class="contact-card" id="contact-form">
				<h3>Reach Out</h3>
				<form class="contact-form" action="https://formsubmit.co/jaidenhenleydev@gmail.com" method="POST">
					<input type="hidden" name="_subject" value="New Portfolio Contact Form Message" />
					<input type="hidden" name="_captcha" value="false" />
					<input type="hidden" name="_honey" />

					<div class="contact-form-grid">
						<label>
							Name
							<input type="text" name="name" required />
						</label>
						<label>
							Email
							<input type="email" name="email" required />
						</label>
					</div>

					<label>
						Subject
						<input type="text" name="subject" required />
					</label>

					<label>
						Message
						<textarea name="message" rows="6" required></textarea>
					</label>

					<button type="submit" class="contact-submit-button">Send Message</button>
				</form>
			</section>
		</main>
